<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/user-layout}">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container-fluid">
            <div class="title-wrapper pt-30">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <div class="title mb-30">
                            <h2>공지사항 작성</h2>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-elements-wrapper">
                <div class="row">
                    <div class="col-lg-12">
                        <div class="card-style mb-30">
                            <form th:action="@{/notice/write}" method="post">
                                <div class="input-style-1">
                                    <label>제목</label>
                                    <input type="text" name="title" placeholder="제목을 입력하세요" required>
                                </div>
                                <div class="input-style-1">
                                    <label>내용</label>
                                    <textarea name="content" rows="10" placeholder="내용을 입력하세요" required></textarea>
                                </div>
                                <div class="text-end">
                                    <a th:href="@{/board/notice}" class="main-btn light-btn btn-hover">취소</a>
                                    <button type="submit" class="main-btn primary-btn btn-hover">등록하기</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
