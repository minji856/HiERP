<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/user-layout}">
<head>
    <meta charset="UTF-8">
    <title>공지사항</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container-fluid">
        <div class="title-wrapper pt-30">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <div class="title mb-30">
                        <h2>공지사항</h2>
                    </div>
                </div>
                <!-- 관리자에게만 글쓰기 보임
                <div class="col-md-6" sec:authorize="hasRole('ADMIN')">
                    <div class="text-end mb-30">
                        <a th:href="@{/notice/write}" class="main-btn primary-btn btn-hover">
                            <i class="lni lni-plus mr-5"></i> 글쓰기
                        </a>
                    </div>
                </div>
                -->
                <div class="text-end mb-30">
                    <a th:href="@{/notice/write}" class="main-btn primary-btn btn-hover">
                        <i class="lni lni-plus mr-5"></i> 글쓰기
                    </a>
                </div>
            </div>
        </div>

        <div class="tables-wrapper">
            <div class="row">
                <div class="col-lg-12">
                    <div class="card-style mb-30">
                        <h6 class="mb-10">전체 공지 내역</h6>
                        <div th:fragment="noticeFragment">
                            <div class="table-wrapper table-responsive">
                                <table class="table">
                                    <colgroup>
                                        <col style="width: 10%;">
                                        <col style="width: auto;">
                                        <col style="width: 15%;">
                                        <col style="width: 20%;">
                                        <col style="width: 10%;">
                                    </colgroup>

                                    <thead>
                                    <tr>
                                        <th class="lead-info min-width"><h6 class="text-sm text-medium">번호</h6></th>
                                        <th class="lead-email min-width"><h6 class="text-sm text-medium">제목</h6></th>
                                        <th class="lead-phone min-width"><h6 class="text-sm text-medium">작성자</h6></th>
                                        <th class="lead-company min-width"><h6 class="text-sm text-medium">작성일</h6></th>
                                        <th class="min-width"><h6 class="text-sm text-medium">조회수</h6></th>
                                    </tr>
                                    </thead>
                                    <!-- end thead-->
                                    <tbody>
                                    <tr th:each="notice : ${notices}" class="notice-row" th:data-id="${notice.id}">
                                        <td class="min-width"><p th:text="${notice.id}">1</p></td>
                                        <td class="min-width">
                                            <a th:href="@{/notice/{id}(id=${notice.id})}"
                                               th:text="${notice.title}" class="text-dark fw-bold">제목</a>
                                        </td>
                                        <td class="min-width"><p th:text="${notice.authorName}">관리자</p></td>
                                        <td class="min-width"><p
                                                th:text="${#temporals.format(notice.createdDate, 'yyyy-MM-dd')}">
                                            2026-04-20</p></td>
                                        <td class="min-width"><p th:text="${notice.viewCount}" class="view-count">0</p>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- end noticeFragment-->
        </div>
    </div>
    <script>
        function updateRealTimeViewCounts() {
            // 현재 화면에 렌더링된 모든 공지사항 행(Row)을 찾아서 ID 목록을 수집합니다.
            const rows = document.querySelectorAll('.notice-row');
            const ids = [];
            rows.forEach(row => {
                ids.push(row.getAttribute('data-id'));
            });

            if (ids.length === 0) return;

            // 쿼리 스트링 형태로 URL을 조립합니다. (예: /api/notice/view-counts?ids=5,4,3)
            const url = `/api/notice/view-counts?ids=${ids.join(',')}`;

            // 비동기 Fetch API를 통해 최신 데이터를 가져옵니다.
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    console.log("Redis에서 받아온 최신 조회수 데이터:", data);
                    // data 예시: {"5": 125, "6": 42}
                    rows.forEach(row => {
                        const id = row.getAttribute('data-id');
                        if (data[id] !== undefined) {
                            // 해당 행 내부의 view-count 클래스를 가진 p태그의 텍스트를 변경합니다.
                            row.querySelector('.view-count').innerText = data[id];
                        }
                    });
                })
                .catch(error => console.error('조회수 동기화 실패:', error));
        }

        // 페이지가 처음 로드되고 나서 한 번 실행
        document.addEventListener("DOMContentLoaded", function () {
            updateRealTimeViewCounts();

            // 10초(10000ms)마다 새로고침 없이 뒷단에서 조회수를 계속 업데이트합니다.
            // 실서버 반영 시에는 시스템 부하를 고려해 30초~1분(30000~60000) 추천
            setInterval(updateRealTimeViewCounts, 10000);
        });
    </script>
</div>
</body>
</html>
