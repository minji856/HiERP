<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/bootstrap/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/bootstrap/css/lineicons.css}">
    <title>개인정보 찾기</title>
    <style>
        /* 1. 탭 전체를 감싸는 바깥 테두리 */
        .custom-tabs {
            display: flex !important;
            width: 100% !important;
            border: 1px solid #e5e5e5 !important; /* 부트스트랩 기본 밑줄 제거 및 테두리 설정 */
            border-radius: 8px !important;
            overflow: hidden;
            background-color: #f4f7fc !important; /* 선택 안 된 비활성 탭들의 기본 배경색 */
            padding: 0 !important;
        }

        /* 2. 각 탭의 정렬 박스 */
        .custom-tabs .nav-item {
            flex: 1 !important;
            margin-bottom: 0 !important; /* 부트스트랩 특유의 -1px 가로막기 마진 제거 */
        }

        /* 3. 탭 버튼 순정 상태 (비활성화 상태) */
        .custom-tabs .nav-link {
            width: 100% !important; /* 버튼 너비를 100%로 채워 공백 제거 */
            color: #5d657b !important;
            background-color: #f4f7fc !important; /* 비활성 상태는 연한 회청색 */
            border: none !important;
            border-radius: 0 !important;
            padding: 14px 0 !important;
            font-weight: 600;
            font-size: 15px;
            text-align: center;
            transition: all 0.2s ease;
        }

        /* 4. 💡 활성화된 탭 스타일 (선택된 탭) */
        .custom-tabs .nav-link.active {
            color: #4a6cf7 !important; /* PlainAdmin 시그니처 블루 글씨색 */
            background-color: #ffffff !important; /* 활성 탭은 선명한 흰색 */
            font-weight: 700;
            /* 선택된 느낌을 확실히 주기 위해 바닥에 세련된 포인트 라인을 추가합니다 */
            border-bottom: 3px solid #4a6cf7 !important;
        }

        /* 5. 첫 번째 탭과 두 번째 탭 사이의 가운데 세로 구분선 */
        .custom-tabs .nav-item:first-child .nav-link {
            border-right: 1px solid #e5e5e5 !important;
        }
    </style>
</head>
<body>

<section class="signin-section">
    <div class="container-fluid px-0">
        <div class="row g-0 auth-row">

            <div class="col-lg-6">
                <div class="auth-cover-wrapper bg-primary-100">
                    <div class="auth-cover">
                        <div class="title text-center">
                            <h1 class="text-primary mb-10">Hi-E</h1>
                            <p class="text-medium para-width-500 mx-auto text-dark">
                                계정 정보를 분실하셨나요?<br>간단한 본인 확인을 통해 분실 정보를 찾아드립니다.
                            </p>
                        </div>
                        <div class="cover-image">
                            <img th:src="@{/css/bootstrap/images/auth/reset-password.svg}" alt="auth-image">
                        </div>
                        <div class="shape-image">
                            <img th:src="@{/css/bootstrap/images/auth/shape.svg}" alt="shape">
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="signin-wrapper">
                    <div class="form-wrapper">

                        <h6 class="mb-20">계정 정보 찾기</h6>
                        <p class="text-sm mb-30 text-gray">원하시는 메뉴 탭을 선택해 정보를 입력해 주세요.</p>

                        <ul class="nav nav-tabs custom-tabs mb-30" id="findAccountTab" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link"
                                        th:classappend="${activeTab == 'id'} ? 'active' : ''"
                                        id="find-id-tab"
                                        data-bs-toggle="tab"
                                        data-bs-target="#find-id"
                                        type="button"
                                        role="tab"
                                        aria-controls="find-id"
                                        aria-selected="false">
                                    아이디 찾기
                                </button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link"
                                        th:classappend="${activeTab != 'id'} ? 'active' : ''"
                                        id="find-pw-tab"
                                        data-bs-toggle="tab"
                                        data-bs-target="#find-pw"
                                        type="button"
                                        role="tab"
                                        aria-controls="find-pw"
                                        aria-selected="true">
                                    비밀번호 찾기
                                </button>
                            </li>
                        </ul>

                        <div class="tab-content" id="findAccountTabContent">

                            <div class="tab-pane fade"
                                 th:classappend="${activeTab == 'id'} ? 'show active' : ''"
                                 id="find-id" role="tabpanel" aria-labelledby="find-id-tab">
                                <form th:action="@{/account/find-id}" method="post">
                                    <div class="row">
                                        <div class="col-12 mb-20">
                                            <div class="input-style-1">
                                                <label class="text-dark fw-medium">이름</label>
                                                <input type="text"
                                                       name="name"
                                                       placeholder="이름을 입력해주세요"
                                                       required/>
                                            </div>
                                        </div>

                                        <div class="col-12">
                                            <div class="input-style-1">
                                                <label class="text-dark fw-medium">휴대폰 번호</label>
                                                <input type="tel"
                                                       name="phone"
                                                       placeholder="- 없이 숫자만 입력해주세요"
                                                       required/>
                                            </div>
                                        </div>

                                        <div class="col-12 mb-20" th:if="${error != null and activeTab == 'id'}">
                                            <div class="alert-toggle-wrapper alert-style-3">
                                                <div class="alert alert-danger d-flex align-items-center py-2 px-3 border-0 rounded-3">
                                                    <div class="icon me-2">
                                                        <i class="lni lni-close-circle"></i>
                                                    </div>
                                                    <div class="content">
                                                        <p class="text-sm mb-0" th:text="${error}">에러 메시지</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="col-12">
                                            <div class="button-group d-flex justify-content-end mt-10">
                                                <button type="submit" class="main-btn primary-btn btn-hover px-4 py-2">
                                                    아이디 찾기<i class="lni lni-search ms-2"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </form>
                            </div>

                            <div class="tab-pane fade"
                                 th:classappend="${activeTab != 'id'} ? 'show active' : ''"
                                 id="find-pw" role="tabpanel"
                                 aria-labelledby="find-pw-tab">
                                <form th:action="@{/account/find-password}" method="post">
                                    <div class="row">

                                        <div class="col-12">
                                            <div class="input-style-1">
                                                <label class="text-dark fw-medium">이메일 주소</label>
                                                <input type="email"
                                                       name="email"
                                                       placeholder="이메일을 입력해주세요"
                                                       required/>
                                            </div>
                                        </div>

                                        <div class="col-12 mb-20" th:if="${error != null and activeTab != 'id'}">
                                            <div class="alert-toggle-wrapper alert-style-3">
                                                <div class="alert alert-danger d-flex align-items-center py-2 px-3 border-0 rounded-3">
                                                    <div class="icon me-2">
                                                        <i class="lni lni-close-circle"></i>
                                                    </div>
                                                    <div class="content">
                                                        <p class="text-sm mb-0" th:text="${error}">에러 메시지</p>
                                                    </div>
                                                </div>
                                            </div>
                                            <div th:if="${errorCode == 'USER_NOT_FOUND'}" class="mt-2 text-start">
                                                <a th:href="@{/account/join}"
                                                   class="text-sm text-primary hover-underline">
                                                    <i class="lni lni-arrow-right me-1"></i>아직 계정이 없으신가요? 회원가입 하러가기
                                                </a>
                                            </div>
                                        </div>

                                        <div class="col-12">
                                            <div class="button-group d-flex justify-content-end mt-10">
                                                <button type="submit" class="main-btn primary-btn btn-hover px-4 py-2">
                                                    비밀번호 찾기<i class="lni lni-search ms-2"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
</script>

</body>
</html>
