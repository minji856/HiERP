<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/bootstrap/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/bootstrap/css/lineicons.css}">
    <title>비밀번호 찾기</title>
</head>
<body><!-- PlainAdmin 전용 Auth 섹션 구조 시작 -->
<section class="signin-section">
    <div class="container-fluid px-0">
        <div class="row g-0 auth-row">

            <!-- 좌측 커버 영역 (PlainAdmin 시그니처 일러스트 섹션) -->
            <div class="col-lg-6">
                <div class="auth-cover-wrapper bg-primary-100">
                    <div class="auth-cover">
                        <div class="title text-center">
                            <h1 class="text-primary mb-10">비밀번호 찾기</h1>
                            <p class="text-medium para-width-500 mx-auto text-dark">
                                비밀번호를 복구하려면 사용자 이름 또는 이메일을 입력하세요. 복구 방법이 안내된 이메일을 받게 됩니다. 비밀번호 복구에 문제가 있는 경우 </p>
                            <a href>여기로</a>
                        </div>
                        <!-- 일러스트 이미지 (프로젝트 경로에 맞게 매핑) -->
                        <div class="cover-image">
                            <img th:src="@{/css/bootstrap/images/auth/reset-password.svg}" alt="auth-image">
                        </div>
                        <div class="shape-image">
                            <img th:src="@{/css/bootstrap/images/auth/shape.svg}" alt="shape">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 2. 우측 폼 입력 영역 (PlainAdmin 전용 signin-wrapper) -->
            <div class="col-lg-6">
                <div class="signin-wrapper">
                    <div class="form-wrapper">

                        <!-- 섹션 타이틀 -->
                        <h6 class="mb-20">비밀번호 찾기</h6>
                        <p class="text-sm mb-30 text-gray">
                            가입하신 이메일 주소를 입력하시면 비밀번호 재설정 안내를 도와드립니다.
                        </p>

                        <!-- 폼 작성 -->
                        <form th:action="@{/account/find-password}" method="post">
                            <div class="row">

                                <!-- 이메일 인풋 박스 -->
                                <div class="col-12">
                                    <div class="input-style-1">
                                        <label class="text-dark fw-medium">이메일 주소</label>
                                        <input type="email"
                                               name="email"
                                               placeholder="example@domain.com"
                                               required/>
                                    </div>
                                </div>

                                <!-- PlainAdmin 전용 알림 컴포넌트 (에러 발생 시) -->
                                <div class="col-12 mb-20" th:if="${error != null}">
                                    <div class="alert-toggle-wrapper alert-style-3">
                                        <div class="alert alert-danger d-flex align-items-center py-2 px-3 border-0 rounded-3">
                                            <div class="icon me-2">
                                                <i class="lni lni-close-circle"></i>
                                            </div>
                                            <div class="content">
                                                <p class="text-sm mb-0" th:text="${error}">존재하지 않는 회원 정보 에러 메시지</p>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- USER_NOT_FOUND 특화 유도 앵커 -->
                                    <div th:if="${errorCode == 'USER_NOT_FOUND'}" class="mt-2 text-start">
                                        <a th:href="@{/account/join}" class="text-sm text-primary hover-underline">
                                            <i class="lni lni-arrow-right me-1"></i>아직 계정이 없으신가요? 회원가입 하러가기
                                        </a>
                                    </div>
                                </div>

                                <!-- 하단 링크 및 액션 버튼 그룹 -->
                                <div class="col-12">
                                    <div class="button-group d-flex justify-content-between align-items-center flex-wrap gap-2">
                                        <a th:href="@{/account/find-id}" class="text-sm text-gray hover-underline">
                                            가입하신 이메일이 기억나지 않나요?
                                        </a>
                                        <!-- PlainAdmin 메인 테마 버튼 -->
                                        <button type="submit" class="main-btn primary-btn btn-hover px-4 py-2">
                                            다음 단계<i class="lni lni-arrow-right ms-2"></i>
                                        </button>
                                    </div>
                                </div>

                            </div>
                        </form>

                    </div>
                </div>
            </div>
            <!-- 우측 영역 끝 -->
        </div>
    </div>
</section>
</body>
</html>
