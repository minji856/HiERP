<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/user-layout}">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/bootstrap/css/main.css}">
    <title>Hi-E</title>
</head>

<body>
<div layout:fragment="content">
    <section class="section">
        <div class="container-fluid">
            <!--title start-->
            <div class="title-wrapper pt-30">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <div class="title">
                            <h2><font dir="auto" style="vertical-align: inherit;"><font dir="auto" style="vertical-align: inherit;">HiE 대시보드</font></font></h2>
                        </div>
                    </div>
                    <!-- end col -->
                </div>
            </div>
            <div class="row">
                <div class="col-lg-7">
                    <div class="card-style mb-30">
                        <div class="title d-flex flex-wrap justify-content-between">
                            <div class="left">
                                <h6 class="text-medium mb-30">
                                    <font dir="auto" style="vertical-align: inherit;">
                                        <font dir="auto" style="vertical-align: inherit;">공지사항</font>
                                    </font>
                                </h6>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-5">
                    <div class="card-style calendar-card mb-30">
                        <div th:replace="~{calendar :: calendarFragment}" class="calendar-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div th:replace="~{modal/eventModal :: eventModal}"></div>
    <div th:replace="~{modal/eventDetailModal :: eventDetail}"></div>
</div>

<th:block layout:fragment="script">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.js'></script>
</th:block>
</body>
</html>
