<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hi-e 로그인</title>
    <!-- Font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    <!-- Bootstrap Icon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/account/common.css}">
    <link rel="stylesheet" th:href="@{/css/account/login.css}">
</head>
<body>
<div class="container">

    <h1>로그인</h1>

    <!-- formLogin loginProcessingUrl과 같은 경로로 지정 -->
    <form th:action="@{/account/login-process}" th:method="post">
        <!-- 이메일 입력 -->
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" placeholder="이메일을 입력하세요" required/>

        <!-- 비밀번호 입력 -->
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required/>

        <!-- CSRF 토큰 (시큐리티 설정 시 필요 현재 에러발생으로 주석처리) -->
        <!-- <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />-->
        <div class="button-row">
            <input type="submit" value="로그인">
        </div>
    </form>

    <!-- 에러 메세지 사용자에게 출력 -->
    <p th:if="${error}" style="color:red;">
        [[${error}]]
    </p>
    <p th:if="${message}" th:text="${message}" style="color: #007BFF; margin-top: 10px;"></p>

    <!-- 회원가입 페이지로 이동하는 링크 -->
    <p>
        아직 계정이 없으신가요?
        <a th:href="@{/account/join}">회원가입 하러 가기<i class="bi bi-arrow-up-right"></i></a>
    </p>

    <div>
        <a th:href="@{/account/find-id}">
            아이디 찾기<i class="bi bi-arrow-up-right"></i>
        </a>
        <span>&nbsp;|&nbsp;</span>
        <a th:href="@{/account/find-password}">
            비밀번호 찾기<i class="bi bi-arrow-up-right"></i>
        </a>
    </div>

    <hr/>

    <!-- 구글 소셜 로그인 -->
    <a th:href="@{/oauth2/authorization/google}">
        <button class="google__btn">
            <i class="bi bi-google"></i>
            Sign in with Google
        </button>
    </a>

    <!-- 네이버 소셜 로그인 -->
    <a th:href="@{/oauth2/authorization/naver}">
        <button class="naver__btn">
            <i class="fa-solid fa-n"></i>
            Sign in with Naver
        </button>
    </a>

    <!-- 카카오 소셜 로그인 -->
    <a th:href="@{/oauth2/authorization/kakao}">
        <button class="kakao__btn">
            <i class="fab fa-kickstarter-k"></i>
            Sign in with Kakao
        </button>
    </a>
</div>
</body>
</html>
