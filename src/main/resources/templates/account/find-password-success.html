<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/bootstrap/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/bootstrap/css/lineicons.css}">
    <title>비밀번호 발송 완료</title>
</head>
<body>

<section class="signin-section">
    <div class="container-fluid px-0">
        <div class="row g-0 auth-row">

            <!-- 1. 좌측 커버 영역 (성공 테마 일러스트) -->
            <div class="col-lg-6">
                <div class="auth-cover-wrapper bg-primary-100">
                    <div class="auth-cover">
                        <div class="title text-center">
                            <h1 class="text-primary mb-10">Hi-E</h1>
                            <p class="text-medium para-width-500 mx-auto text-dark">
                                임시 비밀번호가 안전하게 발송되었습니다.
                            </p>
                        </div>
                        <div class="cover-image">
                            <!-- PlainAdmin 내장 일러스트 재활용 -->
                            <img th:src="@{/css/bootstrap/images/auth/reset-password.svg}" alt="auth-image">
                        </div>
                        <div class="shape-image">
                            <img th:src="@{/css/bootstrap/images/auth/shape.svg}" alt="shape">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 2. 우측 안내문 영역 -->
            <div class="col-lg-6">
                <div class="signin-wrapper">
                    <div class="form-wrapper text-center">

                        <!-- 대형 체크 마크 아이콘 -->
                        <div class="mb-30">
                            <i class="lni lni-envelope text-primary" style="font-size: 80px;"></i>
                        </div>

                        <h3 class="fw-bold text-dark mb-3">메일함을 확인해 주세요!</h3>

                        <p class="text-gray mb-40 text-sm leading-relaxed mx-auto" style="max-width: 400px;">
                            가입하신 이메일 주소로 <br>
                            <span class="text-primary fw-semibold">로그인용 임시 비밀번호</span>를 전송했습니다.<br>
                            안내된 비밀번호로 로그인 후 마이페이지에서 비밀번호를 꼭 변경해 주세요.
                        </p>

                        <!-- 💡 UX 디테일: 유저가 당황하지 않게 팁 박스 제공 (PlainAdmin Card 스타일) -->
                        <div class="card border-0 bg-light p-3 text-start mb-40 rounded-3">
                            <p class="text-xs text-gray-600 mb-1 fw-bold">💡 혹시 메일이 오지 않았나요?</p>
                            <ul class="text-xs text-gray-500 ps-3 mb-0" style="list-style-type: disc;">
                                <li>스팸 메일함 또는 프로모션 메일함을 확인해 보세요.</li>
                                <li>네트워크 상황에 따라 발송이 1~2분 지연될 수 있습니다.</li>
                            </ul>
                        </div>

                        <!-- 로그인하러 가기 메인 버튼 -->
                        <div class="button-group">
                            <a th:href="@{/main}" class="main-btn primary-btn btn-hover w-100 py-3 text-center fw-medium shadow-sm text-decoration-none">
                                <i class="lni lni-enter me-2"></i>로그인 페이지로 이동
                            </a>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>
</section>

</body>
</html>
