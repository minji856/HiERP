<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/bootstrap/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/bootstrap/css/lineicons.css}">
    <title>회원가입 완료</title>
</head>
<body class="bg-light">

<div class="row g-0 auth-row justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="col-11 col-sm-8 col-md-6 col-lg-5 col-xl-4">

        <div class="auth-card-wrapper bg-white rounded-3 shadow-sm p-4 p-sm-5 border">

            <div class="text-center mb-4">
                <div class="icon-shape bg-primary-soft text-primary rounded-circle mx-auto mb-3 d-flex align-items-center justify-content-center"
                     style="width: 60px; height: 60px; background-color: rgba(74, 108, 247, 0.1);">
                    <i class="lni lni-checkmark-circle fs-2 text-primary"></i>
                </div>
                <h3 class="fw-bold text-dark mb-2">회원가입 완료</h3>
            </div>

            <div class="alert bg-light text-center border-0 p-4 mb-4 rounded-3">
                <p class="text-dark fw-medium mb-3">
                    회원가입이 정상적으로 완료되었습니다.
                </p>
                <p class="text-gray mb-1 fs-7 text-start text-sm-center">
                    입력하신 이메일로 인증 메일을 발송했습니다.<br class="d-none d-sm-block">
                    메일함을 확인하여 인증을 완료해주세요.
                </p>
                <div class="bg-white border rounded py-2 px-3 my-3 fw-bold text-primary d-inline-block">
                    <i class="lni lni-envelope me-2"></i>
                    <span th:text="${maskedEmail}">ex***@gmail.com</span>
                </div>
                <p class="text-muted small mb-0">
                    <i class="lni lni-warning me-1"></i> 메일이 보이지 않으면 스팸함을 확인해주세요.
                </p>
            </div>

            <div class="d-flex flex-column gap-2">
                <a th:href="@{/}" class="btn btn-primary w-100 py-2.5 fw-medium shadow-sm">
                    <i class="lni lni-enter me-2"></i>로그인 하러 가기
                </a>

                <form th:action="@{/account/resend-verification}" method="post" class="w-100">
                    <input type="hidden" name="email" th:value="${email}">
                    <button type="submit" class="btn btn-outline-secondary w-100 py-2.5 fw-medium text-dark">
                        <i class="lni lni-reload me-2"></i>인증 메일 재전송
                    </button>
                </form>
            </div>

            <div class="mt-4">
                <div th:if="${message != null}"
                     class="alert alert-success d-flex align-items-center py-2 px-3 border-0 rounded-3 mb-0"
                     role="alert">
                    <i class="lni lni-alert me-2 small"></i>
                    <div class="small" th:text="${message}">성공 메시지</div>
                </div>
                <div th:if="${error != null}"
                     class="alert alert-danger d-flex align-items-center py-2 px-3 border-0 rounded-3 mb-0"
                     role="alert">
                    <i class="lni lni-close-circle me-2 small"></i>
                    <div class="small" th:text="${error}">에러 메시지</div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
