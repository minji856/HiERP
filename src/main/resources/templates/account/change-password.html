<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/user-layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/bootstrap/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/bootstrap/css/lineicons.css}">
    <title>비밀번호 변경</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container-fluid">
        <!-- 타이틀 영역 -->
        <div class="title-wrapper pt-30">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <div class="title mb-30">
                        <h2>비밀번호 변경</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- 본문 폼 영역 -->
        <div class="row">
            <div class="col-lg-12">
                <div class="card-style mb-30">
                    <h6 class="mb-25">비밀번호 수정</h6>

                    <!-- 에러 메시지 표시 -->
                    <div th:if="${error}" class="alert-box danger-alert mb-20">
                        <div class="alert">
                            <p class="text-medium" th:text="${error}"></p>
                        </div>
                    </div>

                    <!-- 성공 메시지 표시 -->
                    <div th:if="${message}" class="alert-box success-alert mb-20">
                        <div class="alert">
                            <p class="text-medium" th:text="${message}"></p>
                        </div>
                    </div>

                    <!-- 비밀번호 변경 폼 -->
                    <form th:action="@{/account/change-password}" method="post">
                        <!-- 현재 비밀번호 -->
                        <div class="input-style-1">
                            <label>현재 비밀번호</label>
                            <input type="password" name="exPassword" placeholder="현재 비밀번호를 입력하세요" required />
                        </div>

                        <!-- 새 비밀번호 -->
                        <div class="input-style-1">
                            <label>새 비밀번호</label>
                            <input type="password" name="newPassword" placeholder="새 비밀번호를 입력하세요" required />
                        </div>

                        <!-- 새 비밀번호 확인 -->
                        <div class="input-style-1">
                            <label>새 비밀번호 확인</label>
                            <input type="password" name="newPasswordChk" placeholder="새 비밀번호를 한번 더 입력하세요" required />
                        </div>

                        <!-- 버튼 그룹 -->
                        <div class="d-flex flex-wrap gap-3 mt-30">
                            <button type="submit" class="main-btn primary-btn btn-hover">
                                <i class="lni lni-key mr-10"></i> 비밀번호 변경
                            </button>
                            <!-- 마이페이지로 돌아가는 취소 버튼 -->
                            <a th:href="@{/account/mypage}" class="main-btn primary-btn-outline btn-hover">
                                취소
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
