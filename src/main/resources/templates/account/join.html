<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/bootstrap/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/bootstrap/css/lineicons.css}">
    <title>Hi-E 회원가입</title>
</head>
<body style="background: rgba(54, 92, 245, 0.1); margin: 0; box-sizing: border-box; display: flex; align-items: center; justify-content: center; padding: 45px 15px; position: relative; z-index: 1; min-height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif !important;">

<!-- 회원가입 카드의 전체 너비를 조절하는 래퍼 -->
<div style="width: 100%; max-width: 540px;">
<!--&lt;!&ndash; PlainAdmin 스타일 레이아웃 구조 &ndash;&gt;-->
<!--<div class="row g-0 auth-row justify-content-center align-items-center" style="min-height: 100vh; padding: 40px 0;">-->
<!--    <div class="col-11 col-sm-10 col-md-8 col-lg-6 col-xl-5">-->

        <!-- 회원가입 카드 박스 -->
        <div class="auth-card-wrapper bg-white rounded-3 shadow-sm p-4 p-sm-5 border">

            <!-- 상단 헤더 -->
            <div class="text-center mb-4">
                <h3 class="fw-bold text-dark mb-1">Hi-E 회원가입</h3>
                <p class="text-gray small">시스템 이용을 위해 회원정보를 입력해 주세요.</p>
            </div>

            <!-- 폼 시작 -->
            <form th:action="@{/account/join}" th:object="${userJoinDto}" method="post">

                <!-- 이름 입력 (PlainAdmin input-style-1 표준) -->
                <div class="input-style-1 mb-3">
                    <label for="name" class="fw-medium text-dark">이름</label>
                    <input type="text" th:field="*{name}" id="name" placeholder="이름을 입력하세요" class="form-control"/>
                    <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
                </div>

                <!-- 생년월일 그룹 -->
                <div class="mb-3">
                    <label class="fw-medium text-dark mb-2">생년월일</label>
                    <div class="d-flex gap-2">
                        <div class="select-style-1 mb-0 flex-fill">
                            <div class="select-position">
                                <select id="birth-year" name="birth-year" class="form-select">
                                    <option value="">연도</option>
                                </select>
                            </div>
                        </div>
                        <div class="select-style-1 mb-0 flex-fill">
                            <div class="select-position">
                                <select id="birth-month" name="birth-month" class="form-select">
                                    <option value="">월</option>
                                </select>
                            </div>
                        </div>
                        <div class="select-style-1 mb-0 flex-fill">
                            <div class="select-position">
                                <select id="birth-day" name="birth-day" class="form-select">
                                    <option value="">일</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <input type="hidden" id="birthday" name="birthday">
                    <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('birthday')}"
                       th:errors="*{birthday}"></p>
                </div>

                <!-- 성별 입력 (PlainAdmin radio-style 컴포넌트 구조) -->
                <div class="mb-3">
                    <label class="fw-medium text-dark mb-2">성별</label>
                    <div class="d-flex gap-4 pt-1">

                        <div class="form-check radio-style d-flex align-items-center mb-0">
                            <input type="radio" th:field="*{gender}" name="gender" value="MALE" id="genderM"
                                   class="form-check-input mt-0">
                            <label for="genderM" class="form-check-label ms-2 text-nowrap mb-0">남성</label>
                        </div>

                        <div class="form-check radio-style d-flex align-items-center mb-0">
                            <input type="radio" th:field="*{gender}" name="gender" value="FEMALE" id="genderF"
                                   class="form-check-input mt-0">
                            <label for="genderF" class="form-check-label ms-2 text-nowrap mb-0">여성</label>
                        </div>

                    </div>
                    <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('gender')}"
                       th:errors="*{gender}"></p>
                </div>

                <!-- 이메일 입력 -->
                <div class="input-style-1 mb-3">
                    <label for="email" class="fw-medium text-dark">이메일</label>
                    <input type="email" th:field="*{email}" id="email" placeholder="이메일을 입력하세요" class="form-control"/>
                    <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('email')}"
                       th:errors="*{email}"></p>
                </div>

                <!-- 비밀번호 입력 -->
                <div class="input-style-1 mb-3">
                    <label for="password" class="fw-medium text-dark d-flex justify-content-between align-items-center">
                        비밀번호
                        <span class="text-muted fw-normal"
                              style="font-size: 0.75rem;">※ 영어 대소문, 숫자, 특수문자 포함 8~16자</span>
                    </label>
                    <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요"
                           class="form-control"/>
                    <div id="passwordRegex" class="small mt-1"></div>
                </div>

                <!-- 비밀번호 재확인 -->
                <div class="input-style-1 mb-3">
                    <label for="passwordcheck" class="fw-medium text-dark">비밀번호 재확인</label>
                    <input type="password" id="passwordcheck" name="passwordcheck" placeholder="비밀번호를 한 번 더 입력하세요"
                           class="form-control"/>
                    <div id="passwordMessage" class="small mt-1"></div>
                </div>

                <!-- 전화번호 입력 -->
                <div class="input-style-1 mb-3">
                    <label for="phoneNum" class="fw-medium text-dark">전화번호</label>
                    <input type="tel" th:field="*{phoneNum}" id="phoneNum" maxlength="11" placeholder="-없이 숫자만 입력해주세요"
                           class="form-control"/>
                    <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('phoneNum')}"
                       th:errors="*{phoneNum}"></p>
                </div>

                <!-- 프로필 이미지 업로드 -->
                <div class="input-style-1 mb-4">
                    <label for="imageUrl" class="fw-medium text-dark">프로필 이미지 URL</label>
                    <input type="text" id="imageUrl" name="imageUrl" placeholder="이미지 경로를 입력해주세요" class="form-control"/>
                </div>

                <!-- 전역 에러/성공 피드백 알림창 (안전한 != null 체크 구조 적용) -->
                <div class="mb-3" th:if="${error != null or message != null}">
                    <div th:if="${error != null}"
                         class="alert alert-danger d-flex align-items-center py-2.5 px-3 border-0 rounded-3 mb-0"
                         role="alert">
                        <i class="lni lni-close-circle me-2"></i>
                        <div class="small" th:text="${error}">글로벌 에러 메시지</div>
                    </div>
                    <div th:if="${message != null}"
                         class="alert alert-success d-flex align-items-center py-2.5 px-3 border-0 rounded-3 mb-0"
                         role="alert">
                        <i class="lni lni-checkmark-circle me-2"></i>
                        <div class="small" th:text="${message}">글로벌 성공 메시지</div>
                    </div>
                </div>

                <!-- 가입하기 버튼 -->
                <div class="button-group">
                    <button type="submit" class="btn btn-primary w-100 py-2.5 fw-medium shadow-sm">
                        <i class="lni lni-user me-2"></i>가입하기
                    </button>
                </div>

            </form>
            <!-- 폼 끝 -->

        </div>
        <!-- /auth-card-wrapper -->
    </div>
</div>
    <!-- JavaScript 파일 -->
    <script th:src="@{/js/validation.js}"></script>
    <script th:src="@{/js/birthValid.js}"></script>
</body>
</html>
