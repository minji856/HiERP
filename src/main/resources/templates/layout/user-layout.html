<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
<style>
    /*!* 마우스를 올렸을 때 메뉴를 강제로 보이게 함 *!*/
    /*.dropdown:hover .dropdown-menu {*/
    /*    display: block;*/
    /*    top :60%;*/
    /*    margin-top: 0; !* 마우스가 이동할 때 끊기지 않게 함 *!*/
    /*    opacity: 1;*/
    /*    visibility: visible;*/
    /*}*/

    /*!* 부트스트랩 기본 애니메이션 방해 요소 제거 *!*/
    /*.dropdown-menu {*/
    /*    display: none;*/
    /*    position: absolute;*/
    /*    right: 0;*/
    /*    left: auto;*/
    /*}*/
    .dropdown-menu {
        margin-top: 0 !important;
    }
</style>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hi-e</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/bootstrap/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/fullCalendar.css}">
</head>
<body>

<!--side-bar end -->
<!--main wrapper start -->
<div class="main-wrapper">
    <div th:replace="~{layout/fragments/sidebar :: sidebarFragment}"></div>
    <header class="header">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-lg-7 col-md-7 col-6">
                    <div class="header-left">
                        <h4 class="fw-600 text-active">Hi-E System</h4>
                    </div>
                </div>

                <div class="col-lg-5 col-md-5 col-6">
                    <div class="header-right d-flex justify-content-end align-items-center">

                        <div sec:authorize="isAnonymous()" class="profile-box ml-15">
                            <a th:href="@{/main}" class="fw-500 text-gray" style="text-decoration: none;">로그인
                                하러가기</a>
                        </div>

                        <div sec:authorize="isAuthenticated()" class="profile-box ml-15 dropdown"
                             id="userDropDown" style="cursor: pointer;">
                            <div class="dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                                <span class="fw-500 text-gray">반갑습니다, </span>
                                <span class="fw-700 text-dark"
                                      th:text="${#authentication.principal?.realname}">User</span>님
                            </div>

                            <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                                <li><a class="dropdown-item" th:href="@{/account/mypage}">마이페이지</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li>
                                    <form th:action="@{/account/logout}" method="post" style="margin: 0;">
                                        <button type="submit" class="dropdown-item text-danger">로그아웃</button>
                                    </form>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <!--header end-->

    <section class="section">
        <div class="container-fluid">
            <div layout:fragment="content"></div>
        </div>
    </section>

    <footer class="footer py-5 bg-light" >
        <div class="container-fluid">
            <div class="row">
                <div class="col-md-6 text-center text-md-start">
                    <p class="text-sm text-gray">Copyright © HI-E. All Rights Reserved</p>
                </div>
            </div>
        </div>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // function toggleMenu() {
    //     document.getElementById("dropdownMenu").classList.toggle("show");
    // }
    document.addEventListener("DOMContentLoaded", function() {
        const dropdownEl = document.getElementById('userDropdown');

        if (dropdownEl) {
            // 부트스트랩 드롭다운 객체 생성
            const toggleEl = dropdownEl.querySelector('.dropdown-toggle');
            const dropdown = new bootstrap.Dropdown(toggleEl);

            // 마우스 올렸을 때
            dropdownEl.addEventListener('mouseenter', () => {
                dropdown.show();
            });

            // 마우스 치웠을 때
            dropdownEl.addEventListener('mouseleave', () => {
                dropdown.hide();
            });
        }
    });
</script>
<th:block layout:fragment="script"></th:block>
</body>
</html>
