<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
<style>
    /*!* 마우스를 올렸을 때 메뉴를 강제로 보이게 함 *!*/
    /*.dropdown:hover .dropdown-menu {*/
    /*    display: block;*/
    /*    top :60%;*/
    /*    margin-top: 0; !* 마우스가 이동할 때 끊기지 않게 함 *!*/
    /*    opacity: 1;*/
    /*    visibility: visible;*/
    /*}*/

    /*!* 부트스트랩 기본 애니메이션 방해 요소 제거 *!*/
    /*.dropdown-menu {*/
    /*    display: none;*/
    /*    position: absolute;*/
    /*    right: 0;*/
    /*    left: auto;*/
    /*}*/
    .dropdown-menu {
        margin-top: 0 !important;
    }
</style>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hi-e</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/bootstrap/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/bootstrap/css/fullcalendar.css}">
</head>
<body>

<!--main wrapper start -->
<div class="main-wrapper">
    <div th:replace="~{layout/fragments/sidebar :: sidebarFragment}"></div>
    <header class="header">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-lg-7 col-md-7 col-6">
                    <div class="header-left">
                        <h4 class="fw-600 text-active">Hi-E System</h4>
                    </div>
                </div>

                <div class="col-lg-5 col-md-5 col-6">
                    <div class="header-right d-flex justify-content-end align-items-center">

                        <!-- 비로그인유저에게 보여지는 메뉴-->
                        <div sec:authorize="isAnonymous()" class="profile-box ml-15">
                            <a th:href="@{/main}" class="fw-500 text-gray" style="text-decoration: none;">로그인
                                하러가기</a>
                        </div>

                        <!-- 로그인한 유저에게만 보여지는 드롭다운 메뉴 -->
                        <div sec:authorize="isAuthenticated()" class="profile-box ml-15 dropdown" id="userDropDown"
                             style="cursor: pointer;">
                            <div class="dropdown-toggle" data-bs-toggle="dropdown" data-bs-auto-close="outside"
                                 aria-expanded="false">
                                <span class="fw-500 text-gray">반갑습니다, </span>
                                <span class="fw-700 text-dark"
                                      th:text="${#authentication.principal?.realname}">User</span>님
                            </div>

                            <ul class="dropdown-menu dropdown-menu-end shadow border-0 p-3"
                                style="width: 340px; border-radius: 12px; margin-top: 10px !important;">

                                <li class="px-2 py-1 d-flex justify-content-between align-items-center mb-1">
                                    <div>
                                        <span class="fw-700 text-dark fs-5"
                                              th:text="${#authentication.principal?.realname}">User</span>
                                        <span class="text-muted" style="font-size: 13px;">님 로그인 중</span>
                                    </div>
                                    <a class="btn btn-sm btn-outline-secondary py-1 px-2 fw-600"
                                       th:href="@{/account/mypage}" style="font-size: 11px; border-radius: 6px;">
                                        마이페이지
                                    </a>
                                </li>

                                <li>
                                    <hr class="dropdown-divider my-2">
                                </li>

                                <li class="px-2 py-1">
                                    <div class="fw-700 text-dark mb-1" style="font-size: 15px;">근태관리</div>
                                    <div class="text-muted mb-3" id="current-work-date" style="font-size: 11px;">2026년
                                        7월 8일 (수) 17:58:52
                                    </div>

                                    <div class="d-flex justify-content-between align-items-end mb-1">
                                        <span class="fw-700 text-dark"
                                              style="font-size: 26px; line-height: 1;">0h 0m</span>
                                        <span class="text-muted" style="font-size: 11px;">최대 52h</span>
                                    </div>

                                    <div class="position-relative my-2" style="height: 22px;">
                                        <div class="progress"
                                             style="height: 7px; background-color: #e9ecef; border-radius: 4px;">
                                            <div class="progress-bar" role="progressbar"
                                                 style="width: 12%; background-color: #dee2e6;" aria-valuenow="12"
                                                 aria-valuemin="0" aria-valuemax="100"></div>
                                        </div>
                                        <div class="position-absolute"
                                             style="left: 75%; top: -5px; border-left: 1px dashed #dc3545; height: 16px;"></div>
                                        <div class="position-absolute text-muted"
                                             style="left: 70%; top: 11px; font-size: 9px;">최소 40h
                                        </div>
                                    </div>

                                    <div class="card bg-light border-0 p-3 my-3" style="border-radius: 8px;">
                                        <div class="d-flex justify-content-between mb-2" style="font-size: 12px;">
                                            <span class="text-secondary">출근시간</span>
                                            <span class="fw-600 text-dark"
                                                  th:text="${attendance != null && attendance.clockInTime != null} ? ${#temporals.format(attendance.clockInTime, 'HH:mm')} : '미등록'">
                                                미등록
                                            </span>
                                        </div>
                                        <div class="d-flex justify-content-between" style="font-size: 12px;">
                                            <span class="text-secondary">퇴근시간</span>
                                            <span class="fw-600 text-muted"
                                                  th:text="${attendance != null && attendance.clockOutTime != null} ? ${#temporals.format(attendance.clockOutTime, 'HH:mm')} : '미등록'">
                                                미등록
                                            </span>
                                        </div>
                                    </div>

                                    <div class="row g-2 mb-2">
                                        <div class="col-6">
                                            <form th:action="@{/attendance/clock-in}" method="post" style="margin:0;">
                                                <button type="submit"
                                                        class="btn btn-outline-secondary w-100 rounded-pill btn-sm py-1.5 fw-600"
                                                        style="font-size: 12px;"
                                                        th:disabled="${attendance != null && attendance.clockInTime != null}">
                                                    출근하기
                                                </button>
                                            </form>
                                        </div>
                                        <div class="col-6">
                                            <form th:action="@{/attendance/clock-out}" method="post" style="margin:0;">
                                                <button type="submit" class="btn btn-outline-info text-info w-100 rounded-pill btn-sm py-1.5 fw-600" style="border-color: #5bc0de; font-size: 12px;"
                                                        th:disabled="${attendance == null || attendance.clockInTime == null || attendance.clockOutTime != null}">
                                                    퇴근하기
                                                </button>
                                            </form>
                                        </div>
                                    </div>

                                    <div class="mt-2">
                                        <select class="form-select form-select-sm rounded-pill text-center text-info fw-600"
                                                style="border-color: #5bc0de; font-size: 12px;">
                                            <option value="NORMAL" selected>상태변경 ∨</option>
                                            <option value="RECCES">휴식</option>
                                            <option value="OUT">외근</option>
                                            <option value="MEETING">회의</option>
                                        </select>
                                    </div>
                                </li>

                                <li>
                                    <hr class="dropdown-divider my-2">
                                </li>

                                <li>
                                    <form th:action="@{/account/logout}" method="post" style="margin: 0;">
                                        <button type="submit"
                                                class="dropdown-item text-danger text-center fw-600 py-1.5"
                                                style="border-radius: 6px; font-size: 13px; background: none;">
                                            로그아웃
                                        </button>
                                    </form>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <!--header end-->

    <section class="section">
        <div class="container-fluid">
            <div layout:fragment="content"></div>
        </div>
    </section>

    <footer class="footer py-5 bg-light">
        <div class="container-fluid">
            <div class="row">
                <div class="col-md-6 text-center text-md-start">
                    <p class="text-sm text-gray">Copyright © HI-E. All Rights Reserved</p>
                </div>
            </div>
        </div>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const dropdownEl = document.getElementById('userDropDown');

        if (dropdownEl) {
            const toggleEl = dropdownEl.querySelector('.dropdown-toggle');
            const dropdown = new bootstrap.Dropdown(toggleEl);
            let timeoutId; // 닫힘 지연을 위한 타이머 변수 추가

            // 마우스 진입 시 드롭다운 오픈
            dropdownEl.addEventListener('mouseenter', () => {
                clearTimeout(timeoutId);
                dropdown.show();
            });

            // 마우스가 드롭다운 전체(메뉴 박스 포함)를 완전히 완전히 벗어났을 때만 닫기
            dropdownEl.addEventListener('mouseleave', (e) => {
                // 💡 0.2초(200ms) 뒤에 닫히도록 지연 설정
                timeoutId = setTimeout(() => {
                    // 셀렉트 박스 옵션창이 열렸을 때 강제로 닫히는 현상을 방지
                    if (document.activeElement.tagName !== 'SELECT') {
                        dropdown.hide();
                    }
                }, 200);
            });
        }

        // 🕒 팝업 내 실시간 초단위 시계 흐르게 하기
        const dateEl = document.getElementById('current-work-date');
        if (dateEl) {
            setInterval(() => {
                const now = new Date();
                const days = ['일', '월', '화', '수', '목', '금', '토'];
                const dateStr = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 (${days[now.getDay()]}) ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
                dateEl.innerText = dateStr;
            }, 1000);
        }
    });
</script>
<th:block layout:fragment="script"></th:block>
</body>
</html>
